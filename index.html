<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramenko – 3D Viewer</title>
  <meta name="description" content="Interaktiver 3D-Viewer für das Ramenko Modell. Drehen, zoomen und erkunden Sie das Objekt in Echtzeit." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-logo">RAMENKO</div>
      <div class="loader-bar-wrap">
        <div class="loader-bar" id="loader-bar"></div>
      </div>
      <div class="loader-text" id="loader-text">Modell wird geladen…</div>
    </div>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <header class="top-bar">
      <div class="brand">RAMENKO</div>
      <div class="hint">
        <span class="hint-icon">⟳</span> Drehen &nbsp;|&nbsp;
        <span class="hint-icon">⤢</span> Zoomen &nbsp;|&nbsp;
        <span class="hint-icon">⊕</span> Verschieben
      </div>
    </header>

    <div class="corner-tag bottom-left">
      <div class="tag-label">green_inside</div>
      <div class="tag-sub">3D Object Viewer</div>
    </div>

    <button id="reset-btn" title="Ansicht zurücksetzen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      Reset
    </button>
  </div>

  <!-- Three.js Canvas -->
  <canvas id="three-canvas"></canvas>

  <!-- Three.js via CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.166.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── Scene Setup ─────────────────────────────────────────────────────────────
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);
    scene.fog = new THREE.FogExp2(0x0a0a0f, 0.012);

    // ─── Camera ───────────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 8);

    // ─── Controls ─────────────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 1;
    controls.maxDistance = 50;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    // Stop auto-rotate on user interaction, resume after pause
    let autoRotateTimeout;
    controls.addEventListener('start', () => {
      controls.autoRotate = false;
      clearTimeout(autoRotateTimeout);
    });
    controls.addEventListener('end', () => {
      autoRotateTimeout = setTimeout(() => {
        controls.autoRotate = true;
      }, 4000);
    });

    // ─── Lighting ─────────────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
    keyLight.position.set(5, 10, 5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 2048;
    keyLight.shadow.mapSize.height = 2048;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x88ccff, 0.8);
    fillLight.position.set(-5, 3, -5);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0x00ff88, 0.4);
    rimLight.position.set(0, -5, -8);
    scene.add(rimLight);

    // Point lights for drama
    const pointLight1 = new THREE.PointLight(0x00ff88, 1.5, 30);
    pointLight1.position.set(3, 5, 3);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0x0088ff, 1.0, 30);
    pointLight2.position.set(-4, 2, -4);
    scene.add(pointLight2);

    // ─── Ground Plane (subtle reflection) ────────────────────────────────────────
    const groundGeo = new THREE.CircleGeometry(20, 64);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x0d0d15,
      roughness: 0.8,
      metalness: 0.2,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // ─── Grid Helper ─────────────────────────────────────────────────────────────
    const grid = new THREE.GridHelper(40, 40, 0x1a1a2e, 0x1a1a2e);
    grid.material.opacity = 0.4;
    grid.material.transparent = true;
    scene.add(grid);

    // ─── OBJ Loader ───────────────────────────────────────────────────────────────
    let loadedModel = null;
    let initialCameraPosition = new THREE.Vector3();
    let initialTarget = new THREE.Vector3();

    const loader = new OBJLoader();
    const loaderBar = document.getElementById('loader-bar');
    const loaderText = document.getElementById('loader-text');
    const loadingScreen = document.getElementById('loading-screen');

    loader.load(
      './public/green_inside_2.obj',
      // onLoad
      (obj) => {
        // Auto-center and scale
        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 4 / maxDim;

        obj.scale.setScalar(scale);
        obj.position.sub(center.multiplyScalar(scale));

        // Lift model so it sits on ground
        const boxAfter = new THREE.Box3().setFromObject(obj);
        obj.position.y -= boxAfter.min.y;

        // Apply materials
        obj.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            child.material = new THREE.MeshStandardMaterial({
              color: 0x2a7a4a,
              roughness: 0.35,
              metalness: 0.15,
              envMapIntensity: 1.0,
            });
          }
        });

        scene.add(obj);
        loadedModel = obj;

        // Position camera nicely
        const finalBox = new THREE.Box3().setFromObject(obj);
        const finalCenter = finalBox.getCenter(new THREE.Vector3());
        const finalSize = finalBox.getSize(new THREE.Vector3());
        const cameraDistance = finalSize.length() * 1.4;

        camera.position.set(
          finalCenter.x + cameraDistance * 0.6,
          finalCenter.y + cameraDistance * 0.4,
          finalCenter.z + cameraDistance * 0.8
        );
        controls.target.copy(finalCenter);
        controls.update();

        initialCameraPosition.copy(camera.position);
        initialTarget.copy(controls.target);

        // Fade out loading screen
        loadingScreen.style.opacity = '0';
        setTimeout(() => {
          loadingScreen.style.display = 'none';
          document.getElementById('ui-overlay').style.opacity = '1';
        }, 600);
      },
      // onProgress
      (xhr) => {
        if (xhr.lengthComputable) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          loaderBar.style.width = pct + '%';
          loaderText.textContent = `Modell wird geladen… ${pct}%`;
        }
      },
      // onError
      (err) => {
        console.error('OBJ Ladefehler:', err);
        loaderText.textContent = 'Fehler beim Laden des Modells.';
      }
    );

    // ─── Reset Button ─────────────────────────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', () => {
      camera.position.copy(initialCameraPosition);
      controls.target.copy(initialTarget);
      controls.update();
      controls.autoRotate = true;
    });

    // ─── Resize Handler ───────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Animate ──────────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      // Animate point lights slowly
      pointLight1.position.x = Math.sin(elapsed * 0.3) * 5;
      pointLight1.position.z = Math.cos(elapsed * 0.3) * 5;
      pointLight2.position.x = Math.cos(elapsed * 0.2) * 4;
      pointLight2.position.z = Math.sin(elapsed * 0.2) * 4;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
